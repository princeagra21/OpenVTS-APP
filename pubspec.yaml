name: fleet_stack
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # iOS-style Cupertino icons
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  device_preview: ^1.2.0
  fl_chart: ^1.1.1
  go_router: ^17.0.0
  http: ^1.6.0
  dio: ^5.8.0+1
  cached_network_image: ^3.4.1
  flutter_riverpod: ^3.0.3
  flutter_svg: ^2.2.3
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  http_parser: ^4.1.2
  google_fonts: ^6.3.2
  animations: ^2.1.1
  calendar_date_picker2: ^2.0.1
  country_picker: ^2.0.27
  file_picker: ^10.3.7
  data_table_2: ^2.7.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  font_awesome_flutter: ^10.12.0
  material_symbols_icons: ^4.2892.0
  time_range_picker: ^2.3.1
  flutter_map_marker_popup: ^8.1.0
  open_route_service: ^1.2.7
  shimmer: ^3.0.0
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  pdf: ^3.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/image/logo.jpeg
    - assets/image/logo.png
    - assets/image/

  # Fonts
  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi/Fonts/OTF/Satoshi-Light.otf
          weight: 300
        - asset: assets/fonts/Satoshi/Fonts/OTF/Satoshi-Regular.otf
          weight: 400
        - asset: assets/fonts/Satoshi/Fonts/OTF/Satoshi-Medium.otf
          weight: 500
        - asset: assets/fonts/Satoshi/Fonts/OTF/Satoshi-Bold.otf
          weight: 700
        - asset: assets/fonts/Satoshi/Fonts/OTF/Satoshi-Black.otf
          weight: 900

# Launcher icons - MUST be top-level, not under flutter:
flutter_icons:
  android: true
  ios: true
  image_path_android: "assets/image/logo.png"
  image_path_ios: "assets/image/logo.png"
  adaptive_icon_background: "#194EE5"
  adaptive_icon_foreground: "assets/image/logo.png"

# Native splash screen - top-level
flutter_native_splash:
  color: "#194EE5"
  image: assets/image/logo.png
  android: true
  ios: true
  web: false
