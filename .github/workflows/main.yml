name: Flutter Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: http://15.206.76.175

    steps:
      # 1️⃣ Checkout Code
      - name: Check out code
        uses: actions/checkout@v2

      # 2️⃣ Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: '17'

      # 3️⃣ Install Flutter SDK
      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable
          echo "${{ github.workspace }}/flutter/bin" >> $GITHUB_PATH

      # 4️⃣ Cache Flutter Dependencies
      - name: Cache Pub Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            flutter/bin/cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      # 5️⃣ Install Dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 6️⃣ Generate Launcher Icons
      - name: Generate Launcher Icons
        run: flutter pub run flutter_launcher_icons:main

      # 7️⃣ Generate Native Splash
      - name: Generate Splash Screen
        run: flutter pub run flutter_native_splash:create

      # 8️⃣ Build Flutter Web (release)
      - name: Build Flutter Web (release)
        run: flutter build web --release --dart-define=DEVICE_PREVIEW=true --no-tree-shake-icons

      # 9️⃣ Zip web build
      - name: Zip web build
        run: |
          cd build/web
          zip -r ../../web_build.zip .

      # 🔟 Upload Web Build to Your VPS (Node Upload API)
      - name: Upload Web Build to Your VPS (Node Upload API)
        if: github.event_name == 'push'
        run: |
          curl -f -X POST "${{ secrets.UPLOAD_URL }}" \
            -H "Authorization: Bearer ${{ secrets.UPLOAD_TOKEN }}" \
            -F "build=@web_build.zip"
